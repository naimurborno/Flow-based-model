# config.yaml — Multi-Model Inference Config
#
# Supported model_name values:
#   flux         → FLUX.1-dev / FLUX.1-schnell  (Black Forest Labs)
#   sd           → Stable Diffusion 1.x / 2.x   (RunwayML / StabilityAI)
#   sd3          → Stable Diffusion 3.x          (StabilityAI)
#   sana         → SANA                          (NVIDIA)
#   lumina       → Lumina-T2X                    (Alpha-VLLM)
#   janus        → Janus / Janus-Pro             (DeepSeek)
#   cogvideo     → CogVideoX (VIDEO output)      (Zhipu AI)
#   mini_gemini  → Mini-Gemini (VLM, TEXT output)(CUHK)

# ── Active model ────────────────────────────────────────────────────
model_name: "sd3_onlb"
model_id:   "stabilityai/stable-diffusion-3-medium-diffusers"

# ── Swap examples (uncomment one block at a time) ────────────────────
#
# FLUX:
# model_name: "flux"
# model_id:   "black-forest-labs/FLUX.1-dev"
#
# SD 1.5:
# model_name: "sd"
# model_id:   "runwayml/stable-diffusion-v1-5"
#
# SD 2.1:
# model_name: "sd"
# model_id:   "stabilityai/stable-diffusion-2-1"
#
# SANA:
# model_name: "sana"
# model_id:   "Efficient-Large-Model/Sana_1600M_1024px_diffusers"
#
# Lumina:
# model_name: "lumina"
# model_id:   "Alpha-VLLM/Lumina-Next-SFT-diffusers"
#
# Janus:
# model_name: "janus"
# model_id:   "deepseek-ai/Janus-Pro-7B"
#
# CogVideo (outputs .mp4):
# model_name: "cogvideo"
# model_id:   "THUDM/CogVideoX-5b"
# output:     "output.mp4"
#
# Mini-Gemini (outputs .txt):
# model_name: "mini_gemini"
# model_id:   "YanweiLi/MGM-7B"
# output:     "output.txt"

# ── Device & seed ────────────────────────────────────────────────────
device: "cuda"   # cuda | cpu | mps
seed:   43

# ── Prompts (first one is used by inference.py; all used by run_experiment.py) ──
prompts:
  - "a photo of an astronaut riding a horse on mars"
  - "a futuristic city at night, neon lights, cinematic"
  - "a red apple on a white marble table, studio lighting"
  - "an old wooden cabin in a snowy forest at dawn"
  - "a golden retriever running on a beach at sunset"

negative_prompt: "blurry, low quality, ugly, deformed"

# ── Output path ──────────────────────────────────────────────────────
output: "output1.png"

# ── Image generation ─────────────────────────────────────────────────
generation:
  height: 512
  width:  512

# ── Flow / Scheduler (used by sd3, flux, sana, lumina) ───────────────
flow:
  num_steps:      50
  guidance_scale: 7.5
  solver:         "euler"    # euler | heun
  t_start:        1.0
  t_end:          0.0

# ── Model-specific extra kwargs ──────────────────────────────────────
# These are passed through to the model loader as opts["model_kwargs"].
# Add any model-specific settings here.
model_kwargs: {}

# Janus example:
# model_kwargs:
#   cfg_weight:  5.0
#   temperature: 1.0
#   top_p:       1.0

# CogVideo example:
# model_kwargs:
#   num_frames: 49
#   fps:        8

# Mini-Gemini example (optional image input):
# model_kwargs:
#   image_path:     "my_image.jpg"
#   max_new_tokens: 512

# ── Trajectory saving (run_experiment.py only) ───────────────────────
save_trajectory: false

# ── Orthogonal Null-Space Langevin Backtracking (ONLB) ───────────────
# Used when model_name is "sd3_onlb".
# lam  : repulsion weight λ  — how hard to push away from clean track
#         higher → more diverse but less coherent  (recommended: 0.1 – 1.0)
# eta  : Langevin temperature η — thermal exploration chaos
#         higher → wider stochastic search          (recommended: 0.01 – 0.3)
# save_original: also write the original (non-diverse) image for comparison
onlb:
  lam:           1.0    # start here — increase slowly (0.05 → 0.1 → 0.2)
  eta:           0.01    # start here — increase slowly (0.01 → 0.05 → 0.1)
  max_drift:     3.0     # clamp escape per step in units of √D — keeps x̃_0 sane
  save_original: true

