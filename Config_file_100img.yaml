# config.yaml — Multi-Model Inference Config
#
# Supported model_name values:
#   flux         → FLUX.1-dev / FLUX.1-schnell  (Black Forest Labs)
#   sd           → Stable Diffusion 1.x / 2.x   (RunwayML / StabilityAI)
#   sd3          → Stable Diffusion 3.x          (StabilityAI)
#   sana         → SANA                          (NVIDIA)
#   lumina       → Lumina-T2X                    (Alpha-VLLM)
#   janus        → Janus / Janus-Pro             (DeepSeek)
#   cogvideo     → CogVideoX (VIDEO output)      (Zhipu AI)
#   mini_gemini  → Mini-Gemini (VLM, TEXT output)(CUHK)

# ── Active model ────────────────────────────────────────────────────
model_name: "sd3"
model_id:   "stabilityai/stable-diffusion-3-medium-diffusers"

# ── Swap examples (uncomment one block at a time) ────────────────────
#
# FLUX:
# model_name: "flux"
# model_id:   "black-forest-labs/FLUX.1-dev"
#
# SD 1.5:
# model_name: "sd"
# model_id:   "runwayml/stable-diffusion-v1-5"
#
# SD 2.1:
# model_name: "sd"
# model_id:   "stabilityai/stable-diffusion-2-1"
#
# SANA:
# model_name: "sana"
# model_id:   "Efficient-Large-Model/Sana_1600M_1024px_diffusers"
#
# Lumina:
# model_name: "lumina"
# model_id:   "Alpha-VLLM/Lumina-Next-SFT-diffusers"
#
# Janus:
# model_name: "janus"
# model_id:   "deepseek-ai/Janus-Pro-7B"
#
# CogVideo (outputs .mp4):
# model_name: "cogvideo"
# model_id:   "THUDM/CogVideoX-5b"
# output:     "output.mp4"
#
# Mini-Gemini (outputs .txt):
# model_name: "mini_gemini"
# model_id:   "YanweiLi/MGM-7B"
# output:     "output.txt"

# ── Device & seed ────────────────────────────────────────────────────
device: "cuda"   # cuda | cpu | mps
seed:   42

