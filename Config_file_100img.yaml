# ── Output path ──────────────────────────────────────────────────────
output: "/content/proposed_generated/"

# ── Image generation ─────────────────────────────────────────────────
generation:
  height: 512
  width:  512

# ── Flow / Scheduler (used by sd3, flux, sana, lumina) ───────────────
flow:
  num_steps:      50
  guidance_scale: 7.5
  solver:         "euler"    # euler | heun
  t_start:        1.0
  t_end:          0.0

# ── Model-specific extra kwargs ──────────────────────────────────────
# These are passed through to the model loader as opts["model_kwargs"].
# Add any model-specific settings here.
model_kwargs: {}

# Janus example:
# model_kwargs:
#   cfg_weight:  5.0
#   temperature: 1.0
#   top_p:       1.0

# CogVideo example:
# model_kwargs:
#   num_frames: 49
#   fps:        8

# Mini-Gemini example (optional image input):
# model_kwargs:
#   image_path:     "my_image.jpg"
#   max_new_tokens: 512

# ── Trajectory saving (run_experiment.py only) ───────────────────────
save_trajectory: false

# ── Stochastic Velocity Sampler ──────────────────────────────────────
# Set enabled: true to replace the standard diffusers pipeline with the
# stochastic branching sampler defined in stochastic_sampler.py.
stochastic_sampler:
  enabled:   true   # true | false
  K:         6       # number of velocity branches per step
  sigma_max: 0.15    # peak noise magnitude at step 0
  lam:       1.5     # λ — entropy reward weight
  alpha:     0.5    # α — Gibbs temperature